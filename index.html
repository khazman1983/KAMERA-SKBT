<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kamera Studio SKBT - Versi Klasik (Optimized)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .camera-box, .dashboard-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* object-fit: cover memastikan paparan live tidak herot/kurus */
        #video, #previewImg { 
            border: 4px solid #333; border-radius: 10px; background: #000; 
            width: 300px; height: 385px; display: block; margin: 0 auto; 
            object-fit: cover; 
        }
        #previewImg { background: #eee; display: none; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin: 3px; transition: 0.3s; font-size: 0.85em; }
        .btn-capture { background: #28a745; width: 100%; font-size: 1.1em; margin-top: 15px; }
        .btn-open { background: #20c997; }
        .btn-close { background: #dc3545; }
        .btn-zoom { background: #6f42c1; }
        .btn-reset-status { background: #6c757d; font-size: 0.7em; padding: 5px 10px; }
        
        .status-item { margin-bottom: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid transparent; background: #f9f9f9; }
        .item-done { border-left-color: #28a745; background: #e8f5e9; }
        .item-pending { border-left-color: #dc3545; background: #fdf2f2; }
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.7em; font-weight: bold; color: white; display: inline-block; margin-top: 5px; }
        .tag-done { background: #28a745; }
        .tag-pending { background: #dc3545; }
        
        .search-box { width: 94%; padding: 10px; margin-top: 5px; border: 2px solid #0055ff; border-radius: 8px; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .label-status { text-align: center; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

<h1 style="text-align:center;">📸 Sistem Kamera Studio SKBT</h1>

<div class="main-container">
    <div class="camera-box" style="width: 350px;">
        <label>Pilih Kelas & Nama:</label>
        <select id="pilihKelas" onchange="muatNama()">
            <option value="">-- Pilih Kelas --</option>
        </select>
        <select id="pilihNama">
            <option value="">-- Pilih Nama --</option>
        </select>
        <input type="text" id="searchNama" class="search-box" oninput="tapisNama()" placeholder="🔍 Cari nama murid...">

        <div style="margin-top:15px;">
            <div id="labelLive" class="label-status" style="color: red; display:none;">🔴 LIVE KAMERA</div>
            <video id="video" autoplay playsinline></video>
            <div id="labelPreview" class="label-status" style="color: #0055ff; display:none;">✅ GAMBAR DIRAKAM</div>
            <img id="previewImg">
        </div>

        <div style="text-align:center; margin-top: 10px;">
            <button class="btn btn-open" onclick="bukaKamera()">📹 Buka</button>
            <button class="btn btn-close" onclick="tutupKamera()">⏹️ Tutup</button>
            <div style="margin-top:5px;">
                <button class="btn btn-zoom" onclick="larasZoom(0.1)">➕ Zoom In</button>
                <button class="btn btn-zoom" onclick="larasZoom(-0.1)">➖ Zoom Out</button>
            </div>
        </div>

        <button id="btnSnap" class="btn btn-capture" onclick="ambilGambar()">AMBIL & SIMPAN</button>
    </div>

    <div class="dashboard-box" style="width: 450px;">
        <h3>📊 Status Murid</h3>
        <div id="listDashboard" style="height: 550px; overflow-y: auto;">
            <p style="text-align:center; color:gray;">Sila pilih kelas...</p>
        </div>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz8ZSKgbVWiWbRtt1YJneKYuvCMS-3-HyZ8qg-7XeeLD4nSO1lIx9csTS7cmTSNVopO/exec';
    
    let video = document.getElementById('video');
    let previewImg = document.getElementById('previewImg');
    let currentStream = null;
    let dataSekolah = {}, sudahSelesaiList = [], zoomLevel = 1.0;

    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            dataSekolah = await res.json();
            const selKelas = document.getElementById('pilihKelas');
            Object.keys(dataSekolah).forEach(k => selKelas.add(new Option(k, k)));
            updateStats();
        } catch (e) { console.error("Gagal muat data."); }
    };

    async function bukaKamera() {
        try {
            if (currentStream) tutupKamera();
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720 } 
            });
            video.srcObject = currentStream;
            video.style.display = "block";
            previewImg.style.display = "none";
            document.getElementById('labelLive').style.display = "block";
            document.getElementById('labelPreview').style.display = "none";
            zoomLevel = 1.0;
            larasZoom(0);
        } catch (err) { alert("Sila benarkan akses kamera."); }
    }

    function tutupKamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
            video.srcObject = null;
        }
    }

    function larasZoom(n) {
        zoomLevel = Math.max(1.0, Math.min(3.0, zoomLevel + n));
        video.style.transform = `scale(${zoomLevel})`;
    }

    async function ambilGambar() {
        const nama = document.getElementById('pilihNama').value;
        const kelas = document.getElementById('pilihKelas').value;
        if(!nama || !kelas) return alert("Pilih Nama & Kelas!");

        const btn = document.getElementById('btnSnap');
        btn.innerText = "MENYIMPAN...";
        btn.disabled = true;

        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        
        // Saiz simpanan Portrait (600x770)
        canvas.width = 600;
        canvas.height = 770;

        // Logik CROP TENGAH (MENGELAKKAN MUKA KURUS)
        let vWidth = video.videoWidth;
        let vHeight = video.videoHeight;
        let targetRatio = canvas.width / canvas.height;
        
        let sHeight = vHeight / zoomLevel;
        let sWidth = sHeight * targetRatio;
        
        // Pastikan sWidth tidak melebihi lebar video asal
        if (sWidth > vWidth / zoomLevel) {
            sWidth = vWidth / zoomLevel;
            sHeight = sWidth / targetRatio;
        }

        let sx = (vWidth - sWidth * zoomLevel) / 2;
        let sy = (vHeight - sHeight * zoomLevel) / 2;

        ctx.drawImage(video, sx, sy, sWidth * zoomLevel, sHeight * zoomLevel, 0, 0, canvas.width, canvas.height);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        previewImg.src = imageData;
        previewImg.style.display = "block";
        video.style.display = "none";
        document.getElementById('labelLive').style.display = "none";
        document.getElementById('labelPreview').style.display = "block";

        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ 
                    image: imageData, 
                    filename: `${nama}_${kelas}.jpg`, 
                    nama: nama, 
                    kelas: kelas 
                }) 
            });
            // Update senarai lokal terus
            if(!sudahSelesaiList.includes(nama + "|" + kelas)) sudahSelesaiList.push(nama + "|" + kelas);
            renderDashboard();
        } catch (e) { alert("Ralat simpan."); }
        finally {
            btn.innerText = "AMBIL & SIMPAN";
            btn.disabled = false;
        }
    }

    async function updateStats() {
        try {
            const res = await fetch(scriptURL + "?action=getStats");
            sudahSelesaiList = await res.json();
            renderDashboard();
        } catch (e) { console.log("Gagal kemaskini status."); }
    }

    function renderDashboard() {
        const kelas = document.getElementById('pilihKelas').value;
        const listDiv = document.getElementById('listDashboard');
        if(!kelas) return;
        
        let html = "";
        dataSekolah[kelas].forEach(nama => {
            const isDone = sudahSelesaiList.includes(nama + "|" + kelas);
            html += `
                <div class="status-item ${isDone?'item-done':'item-pending'}">
                    <div>
                        <div style="font-weight:bold; font-size:0.85em;">${nama}</div>
                        <span class="status-tag ${isDone?'tag-done':'tag-pending'}">${isDone?'SIAP':'BELUM'}</span>
                    </div>
                    ${isDone ? `<button class="btn btn-reset-status" onclick="resetStatus('${nama}','${kelas}')">🔄 Reset</button>` : ''}
                </div>`;
        });
        listDiv.innerHTML = html;
    }

    async function resetStatus(nama, kelas) {
        if(!confirm(`Padam rekod ${nama} untuk ambil semula?`)) return;
        
        // Update UI secara lokal (Terus jadi MERAH)
        sudahSelesaiList = sudahSelesaiList.filter(item => item !== (nama + "|" + kelas));
        renderDashboard();

        try {
            await fetch(`${scriptURL}?action=resetStatus&nama=${encodeURIComponent(nama)}&kelas=${encodeURIComponent(kelas)}`);
        } catch (e) { 
            alert("Ralat server, tetapi paparan telah dikemaskini."); 
        }
    }

    function muatNama() { document.getElementById('searchNama').value = ""; tapisNama(); renderDashboard(); }
    function tapisNama() {
        const kataKunci = document.getElementById('searchNama').value.toLowerCase();
        const kelas = document.getElementById('pilihKelas').value;
        const selNama = document.getElementById('pilihNama');
        selNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if(dataSekolah[kelas]) {
            dataSekolah[kelas].filter(n => n.toLowerCase().includes(kataKunci))
                .forEach(n => selNama.add(new Option(n, n)));
        }
    }
</script>
</body>
</html>
