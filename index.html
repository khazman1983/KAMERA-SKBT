<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Kamera Studio SKBT v6</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .camera-box, .dashboard-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        canvas, #previewImg { border: 4px solid #333; border-radius: 10px; background: #000; width: 300px; height: 385px; display: block; margin: 0 auto; }
        #previewImg { background: #eee; object-fit: cover; display: none; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin: 3px; transition: 0.3s; font-size: 0.85em; }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-blue { background: #0055ff; } 
        .btn-white { background: #ffffff; color: #333; border: 1px solid #ccc; }
        .btn-capture { background: #28a745; width: 100%; font-size: 1.1em; margin-top: 15px; }
        .btn-open { background: #20c997; }
        .btn-close { background: #dc3545; }
        .btn-reset-cam { background: #f0ad4e; }
        .btn-reset-status { background: #6c757d; padding: 4px 8px; font-size: 0.7em; }
        
        /* Dashboard Styling */
        .status-item { 
            margin-bottom: 10px; padding: 10px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid transparent; background: #f9f9f9;
        }
        .item-done { border-left-color: #28a745; background: #e8f5e9; }
        .item-pending { border-left-color: #dc3545; background: #fdf2f2; }
        
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.7em; font-weight: bold; }
        .tag-done { background: #28a745; color: white; }
        .tag-pending { background: #dc3545; color: white; }
        
        .search-box { width: 94%; padding: 10px; margin-top: 5px; border: 2px solid #0055ff; border-radius: 8px; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .preview-label { text-align: center; font-weight: bold; color: #0055ff; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<h1 style="text-align:center;">📸 Sistem Kamera Studio SKBT</h1>

<div class="main-container">
    <div class="camera-box" style="width: 350px;">
        <label>1. Pilih Kelas & Nama:</label>
        <select id="pilihKelas" onchange="muatNama()">
            <option value="">-- Pilih Kelas --</option>
        </select>
        <select id="pilihNama">
            <option value="">-- Pilih Nama --</option>
        </select>
        <input type="text" id="searchNama" class="search-box" oninput="tapisNama()" placeholder="🔍 Tapis nama...">

        <video id="video" autoplay playsinline style="display:none;"></video>
        
        <div style="margin-top:15px;">
            <div id="labelLive" class="preview-label" style="display:block; color: red;">🔴 LIVE</div>
            <canvas id="canvas"></canvas>
            
            <div id="labelPreview" class="preview-label">✅ PREVIEW GAMBAR TERAKHIR</div>
            <img id="previewImg" alt="Preview">
        </div>

        <div style="text-align:center; margin-top: 10px;">
            <button class="btn btn-open" onclick="bukaKamera()">📹 Buka</button>
            <button class="btn btn-reset-cam" onclick="resetKamera()">🔄 Cam</button>
            <button class="btn btn-close" onclick="tutupKamera()">⏹️ Tutup</button>
        </div>

        <div style="margin: 10px 0; text-align:center;">
            <button class="btn btn-blue" onclick="setBG('blue')">Biru</button>
            <button class="btn btn-white" onclick="setBG('white')">Putih</button>
        </div>
        <button id="btnSnap" class="btn btn-capture" onclick="ambilGambar()">AMBIL & SIMPAN</button>
    </div>

    <div class="dashboard-box" style="width: 450px;">
        <h3>📊 Status Murid</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:15px;">
            <div style="background:#e8f5e9; padding:10px; border-radius:10px; text-align:center;">
                <small>SIAP</small><br><b id="statSelesai">0</b>
            </div>
            <div style="background:#fdf2f2; padding:10px; border-radius:10px; text-align:center;">
                <small>BELUM</small><br><b id="statBelum">0</b>
            </div>
        </div>
        
        <div id="listDashboard" style="height: 520px; overflow-y: auto;">
            <p style="color:gray; text-align:center;">Pilih kelas untuk mula...</p>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyTMq0RHNvcJqQla3pUyIgCp5ffRPvEedb6HV9lmmFEgjvC_513_7vdZssFXN0qPul7/exec';
    let dataSekolah = {}, sudahSelesaiList = [], selectedBG = 'blue', currentStream = null, animationId = null;
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const previewImg = document.getElementById('previewImg');

    window.onload = async () => {
        const res = await fetch(scriptURL);
        dataSekolah = await res.json();
        const selKelas = document.getElementById('pilihKelas');
        Object.keys(dataSekolah).forEach(k => selKelas.add(new Option(k, k)));
        updateStats();
    };

    async function bukaKamera() {
        try {
            if (currentStream) tutupKamera();
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = currentStream;
            video.onloadedmetadata = () => { 
                video.play(); 
                canvas.style.display = "block";
                document.getElementById('labelLive').style.display = "block";
                previewImg.style.display = "none";
                document.getElementById('labelPreview').style.display = "none";
                draw(); 
            };
        } catch (err) { alert("Akses kamera ditolak."); }
    }

    function tutupKamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null; video.srcObject = null;
            if (animationId) cancelAnimationFrame(animationId);
        }
    }

    function resetKamera() { tutupKamera(); setTimeout(bukaKamera, 300); }
    function setBG(c) { selectedBG = c; }

    function tapisNama() {
        const kataKunci = document.getElementById('searchNama').value.toLowerCase();
        const kelas = document.getElementById('pilihKelas').value;
        const selNama = document.getElementById('pilihNama');
        selNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if(dataSekolah[kelas]) {
            dataSekolah[kelas].filter(n => n.toLowerCase().includes(kataKunci))
                .forEach(n => selNama.add(new Option(n, n)));
        }
    }

    function muatNama() { document.getElementById('searchNama').value = ""; tapisNama(); renderDashboard(); }

    async function updateStats() {
        const res = await fetch(scriptURL + "?action=getStats");
        sudahSelesaiList = await res.json();
        renderDashboard();
    }

    // Fungsi baru untuk reset status individu
    async function resetStatus(nama, kelas) {
        if(!confirm(`Adakah anda mahu membenarkan ${nama} ambil gambar semula?`)) return;
        try {
            await fetch(scriptURL + `?action=resetStatus&nama=${encodeURIComponent(nama)}&kelas=${encodeURIComponent(kelas)}`);
            updateStats();
        } catch (e) { alert("Gagal mengemaskini status."); }
    }

    function renderDashboard() {
        const kelas = document.getElementById('pilihKelas').value;
        const listDiv = document.getElementById('listDashboard');
        if(!kelas) return;
        let html = ""; let selesai = 0;
        dataSekolah[kelas].forEach(nama => {
            const isDone = sudahSelesaiList.includes(nama + "|" + kelas);
            if(isDone) selesai++;
            html += `<div class="status-item ${isDone?'item-done':'item-pending'}">
                        <div>
                            <div style="font-weight:500; font-size:0.85em;">${nama}</div>
                            <span class="status-tag ${isDone?'tag-done':'tag-pending'}">${isDone?'SIAP':'BELUM'}</span>
                        </div>
                        ${isDone ? `<button class="btn btn-reset-status" onclick="resetStatus('${nama}','${kelas}')">🔄 Reset</button>` : ''}
                     </div>`;
        });
        document.getElementById('statSelesai').innerText = selesai;
        document.getElementById('statBelum').innerText = dataSekolah[kelas].length - selesai;
        listDiv.innerHTML = html;
    }

    function draw() {
        if (!currentStream || video.paused || video.ended) return;
        canvas.width = 300; canvas.height = 385;
        ctx.drawImage(video, -100, 0, 550, 385); 
        let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < frame.data.length; i += 4) {
            let r = frame.data[i], g = frame.data[i+1], b = frame.data[i+2];
            if (g > 100 && g > r * 1.2 && g > b * 1.2) { 
                if(selectedBG === 'blue') { frame.data[i]=0; frame.data[i+1]=0; frame.data[i+2]=255; }
                else { frame.data[i]=255; frame.data[i+1]=255; frame.data[i+2]=255; }
            }
        }
        ctx.putImageData(frame, 0, 0);
        animationId = requestAnimationFrame(draw);
    }

    async function ambilGambar() {
        const nama = document.getElementById('pilihNama').value;
        const kelas = document.getElementById('pilihKelas').value;
        const btn = document.getElementById('btnSnap');
        if(!nama || !kelas) return alert("Pilih murid dahulu!");
        
        btn.innerText = "SEDANG MENYIMPAN...";
        btn.disabled = true;
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        
        // Tunjuk Preview
        previewImg.src = imageData;
        previewImg.style.display = "block";
        document.getElementById('labelPreview').style.display = "block";
        canvas.style.display = "none";
        document.getElementById('labelLive').style.display = "none";

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ image: imageData, filename: `${nama}_${kelas}.jpg`, nama: nama, kelas: kelas })
            });
            updateStats();
        } catch (e) { alert("Gagal muat naik."); } 
        finally {
            btn.innerText = "AMBIL & SIMPAN";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
