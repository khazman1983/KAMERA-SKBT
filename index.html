<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Kamera Studio SKBT</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .camera-box, .dashboard-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        canvas { border: 4px solid #333; border-radius: 10px; background: #000; width: 350px; height: 450px; display: block; margin: 0 auto; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin: 5px; transition: 0.3s; }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-blue { background: #0055ff; } 
        .btn-white { background: #ffffff; color: #333; border: 1px solid #ccc; }
        .btn-capture { background: #28a745; width: 100%; font-size: 1.1em; margin-top: 15px; }
        .btn-open { background: #20c997; }
        .btn-close { background: #dc3545; }
        .btn-reset { background: #f0ad4e; }
        
        /* Gaya Dashboard Baharu */
        .status-item { 
            margin-bottom: 10px; padding: 10px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid transparent; background: #f9f9f9;
        }
        .item-done { border-left-color: #28a745; background: #e8f5e9; }
        .item-pending { border-left-color: #dc3545; background: #fdf2f2; }
        
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        .tag-done { background: #28a745; color: white; }
        .tag-pending { background: #dc3545; color: white; }
        
        .search-box { width: 94%; padding: 12px; margin-top: 5px; border: 2px solid #0055ff; border-radius: 8px; font-size: 1em; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
        label { font-weight: bold; font-size: 0.9em; color: #444; }
    </style>
</head>
<body>

<h1 style="text-align:center;">📸 Sistem Kamera Studio SKBT</h1>

<div class="main-container">
    <div class="camera-box">
        <label>1. Pilih Kelas:</label>
        <select id="pilihKelas" onchange="muatNama()">
            <option value="">-- Pilih Kelas --</option>
        </select>

        <label>2. Pilih Nama Murid:</label>
        <select id="pilihNama">
            <option value="">-- Pilih Nama --</option>
        </select>

        <label>3. Carian Pantas:</label>
        <input type="text" id="searchNama" class="search-box" oninput="tapisNama()" placeholder="Taip nama untuk tapis...">

        <video id="video" autoplay playsinline style="display:none;"></video>
        <div style="position:relative; margin-top:15px;">
            <canvas id="canvas"></canvas>
        </div>

        <div style="text-align:center; margin-top: 10px;">
            <button class="btn btn-open" onclick="bukaKamera()">📹 Buka</button>
            <button class="btn btn-reset" onclick="resetKamera()">🔄 Semula</button>
            <button class="btn btn-close" onclick="tutupKamera()">⏹️ Tutup</button>
        </div>

        <div style="margin: 15px 0; text-align:center;">
            <button class="btn btn-blue" onclick="setBG('blue')">Latar Biru</button>
            <button class="btn btn-white" onclick="setBG('white')">Latar Putih</button>
        </div>
        <button id="btnSnap" class="btn btn-capture" onclick="ambilGambar()">AMBIL & SIMPAN</button>
    </div>

    <div class="dashboard-box" style="width: 450px;">
        <h3>📊 Ringkasan Sesi</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:20px;">
            <div style="background:#e8f5e9; padding:15px; border-radius:10px; text-align:center;">
                <span style="display:block; font-size:0.8em; color:#2e7d32;">SIAP</span>
                <b id="statSelesai" style="font-size:1.5em; color:#1b5e20;">0</b>
            </div>
            <div style="background:#fdf2f2; padding:15px; border-radius:10px; text-align:center;">
                <span style="display:block; font-size:0.8em; color:#c62828;">BELUM</span>
                <b id="statBelum" style="font-size:1.5em; color:#b71c1c;">0</b>
            </div>
        </div>
        
        <div id="listDashboard" style="height: 500px; overflow-y: auto; padding-right:5px;">
            <p style="color:gray; text-align:center;">Sila pilih kelas...</p>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyTMq0RHNvcJqQla3pUyIgCp5ffRPvEedb6HV9lmmFEgjvC_513_7vdZssFXN0qPul7/exec';
    let dataSekolah = {};
    let sudahSelesaiList = [];
    let selectedBG = 'blue';
    let currentStream = null;
    let animationId = null;
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            dataSekolah = await res.json();
            const selKelas = document.getElementById('pilihKelas');
            Object.keys(dataSekolah).forEach(k => selKelas.add(new Option(k, k)));
            updateStats();
        } catch (e) {
            alert("Gagal memuatkan pangkalan data.");
        }
    };

    async function bukaKamera() {
        try {
            if (currentStream) tutupKamera();
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = currentStream;
            video.onloadedmetadata = () => { video.play(); draw(); };
        } catch (err) {
            alert("Sila benarkan akses kamera.");
        }
    }

    function tutupKamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
            video.srcObject = null;
            if (animationId) cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    function resetKamera() {
        tutupKamera();
        setTimeout(bukaKamera, 300);
    }

    function setBG(c) { selectedBG = c; }

    function tapisNama() {
        const kataKunci = document.getElementById('searchNama').value.toLowerCase();
        const kelas = document.getElementById('pilihKelas').value;
        const selNama = document.getElementById('pilihNama');
        selNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if(dataSekolah[kelas]) {
            dataSekolah[kelas]
                .filter(nama => nama.toLowerCase().includes(kataKunci))
                .forEach(n => selNama.add(new Option(n, n)));
        }
    }

    function muatNama() {
        document.getElementById('searchNama').value = ""; 
        tapisNama();
        renderDashboard();
    }

    async function updateStats() {
        try {
            const res = await fetch(scriptURL + "?action=getStats");
            sudahSelesaiList = await res.json();
            renderDashboard();
        } catch (e) { console.warn("Sync failed"); }
    }

    function renderDashboard() {
        const kelas = document.getElementById('pilihKelas').value;
        const listDiv = document.getElementById('listDashboard');
        if(!kelas) return;
        let html = ""; let selesai = 0;
        dataSekolah[kelas].forEach(nama => {
            const isDone = sudahSelesaiList.includes(nama + "|" + kelas);
            if(isDone) selesai++;
            html += `<div class="status-item ${isDone?'item-done':'item-pending'}">
                        <span style="font-weight:500;">${nama}</span>
                        <span class="status-tag ${isDone?'tag-done':'tag-pending'}">${isDone?'SIAP':'BELUM'}</span>
                     </div>`;
        });
        document.getElementById('statSelesai').innerText = selesai;
        document.getElementById('statBelum').innerText = dataSekolah[kelas].length - selesai;
        listDiv.innerHTML = html;
    }

    function draw() {
        if (!currentStream || video.paused || video.ended) return;
        canvas.width = 350; canvas.height = 450;
        ctx.drawImage(video, -100, 0, 600, 450); 
        let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < frame.data.length; i += 4) {
            let r = frame.data[i], g = frame.data[i+1], b = frame.data[i+2];
            if (g > 100 && g > r * 1.2 && g > b * 1.2) { 
                if(selectedBG === 'blue') { frame.data[i]=0; frame.data[i+1]=0; frame.data[i+2]=255; }
                else { frame.data[i]=255; frame.data[i+1]=255; frame.data[i+2]=255; }
            }
        }
        ctx.putImageData(frame, 0, 0);
        animationId = requestAnimationFrame(draw);
    }

    async function ambilGambar() {
        const nama = document.getElementById('pilihNama').value;
        const kelas = document.getElementById('pilihKelas').value;
        const btn = document.getElementById('btnSnap');
        if(!nama || !kelas) return alert("Pilih murid dahulu!");
        
        btn.innerText = "SEDANG MENYIMPAN...";
        btn.disabled = true;
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ image: imageData, filename: `${nama}_${kelas}.jpg`, nama: nama, kelas: kelas })
            });
            alert("Gambar Berjaya Disimpan!");
            updateStats(); // Automatik kemaskini dashboard
        } catch (e) {
            alert("Gagal muat naik.");
        } finally {
            btn.innerText = "AMBIL & SIMPAN";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
