<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Kamera Studio SKBT</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .camera-box, .dashboard-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        canvas { border: 4px solid #333; border-radius: 10px; background: #000; width: 350px; height: 450px; display: block; margin: 0 auto; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin: 5px; transition: 0.3s; }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-blue { background: #0055ff; } 
        .btn-white { background: #ffffff; color: #333; border: 1px solid #ccc; }
        .btn-capture { background: #28a745; width: 100%; font-size: 1.1em; margin-top: 15px; }
        .btn-open { background: #20c997; }
        .btn-close { background: #dc3545; }
        .status-tag { padding: 3px 8px; border-radius: 4px; font-size: 0.8em; }
        .tag-done { background: #d4edda; color: #155724; }
        .tag-pending { background: #f8d7da; color: #721c24; }
        .search-box { width: 94%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<h1 style="text-align:center;">📸 Sistem Kamera Studio SKBT</h1>

<div class="main-container">
    <div class="camera-box">
        <label>Pilih Kelas:</label>
        <select id="pilihKelas" onchange="muatNama()">
            <option value="">-- Pilih Kelas --</option>
        </select>

        <label>Pilih Nama:</label>
        <select id="pilihNama">
            <option value="">-- Pilih Nama Murid --</option>
        </select>

        <input type="text" id="searchNama" class="search-box" oninput="tapisNama()" placeholder="🔍 Cari nama murid di sini...">
        <p style="font-size: 0.75em; color: #666; margin-bottom: 15px;">*Taip nama untuk tapis senarai di atas.</p>

        <video id="video" autoplay playsinline style="display:none;"></video>
        <canvas id="canvas"></canvas>

        <div style="text-align:center; margin-top: 10px;">
            <button class="btn btn-open" onclick="bukaKamera()">📹 Buka Kamera</button>
            <button class="btn btn-close" onclick="tutupKamera()">⏹️ Tutup Kamera</button>
        </div>

        <div style="margin: 15px 0; text-align:center;">
            <button class="btn btn-blue" onclick="setBG('blue')">Latar Biru</button>
            <button class="btn btn-white" onclick="setBG('white')">Latar Putih</button>
        </div>
        <button id="btnSnap" class="btn btn-capture" onclick="ambilGambar()">AMBIL & SIMPAN</button>
    </div>

    <div class="dashboard-box" style="width: 400px;">
        <h3>📊 Dashboard Status</h3>
        <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
            <div>Selesai: <b id="statSelesai" style="color:green">0</b></div>
            <div>Belum: <b id="statBelum" style="color:red">0</b></div>
        </div>
        <div id="listDashboard" style="height: 440px; overflow-y: auto; border-top: 1px solid #eee; padding-top:10px;">
            <p style="color:gray">Pilih kelas untuk lihat senarai...</p>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyTMq0RHNvcJqQla3pUyIgCp5ffRPvEedb6HV9lmmFEgjvC_513_7vdZssFXN0qPul7/exec';
    let dataSekolah = {};
    let sudahSelesaiList = [];
    let selectedBG = 'blue';
    let currentStream = null;
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            dataSekolah = await res.json();
            const selKelas = document.getElementById('pilihKelas');
            Object.keys(dataSekolah).forEach(k => selKelas.add(new Option(k, k)));
            updateStats();
        } catch (e) {
            console.error("Gagal memuat data sekolah", e);
        }
    };

    // Fungsi Buka Kamera (Dengan pengaktifan video paksa)
    async function bukaKamera() {
        try {
            if (currentStream) tutupKamera();

            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 } 
            });
            
            video.srcObject = currentStream;
            
            // Wajibkan video play sebelum draw bermula
            video.onloadedmetadata = () => {
                video.play();
                draw(); 
            };
        } catch (err) {
            alert("Ralat: Kamera tidak dijumpai. Sila benarkan (Allow) akses kamera pada browser.");
            console.error(err);
        }
    }

    function tutupKamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    function setBG(c) { selectedBG = c; }

    function tapisNama() {
        const kataKunci = document.getElementById('searchNama').value.toLowerCase();
        const kelas = document.getElementById('pilihKelas').value;
        const selNama = document.getElementById('pilihNama');
        
        selNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        
        if(dataSekolah[kelas]) {
            dataSekolah[kelas]
                .filter(nama => nama.toLowerCase().includes(kataKunci))
                .forEach(n => selNama.add(new Option(n, n)));
        }
    }

    function muatNama() {
        document.getElementById('searchNama').value = ""; 
        tapisNama();
        renderDashboard();
    }

    async function updateStats() {
        const res = await fetch(scriptURL + "?action=getStats");
        sudahSelesaiList = await res.json();
        renderDashboard();
    }

    function renderDashboard() {
        const kelas = document.getElementById('pilihKelas').value;
        const listDiv = document.getElementById('listDashboard');
        if(!kelas) return;

        let html = ""; let selesai = 0;
        dataSekolah[kelas].forEach(nama => {
            const isDone = sudahSelesaiList.includes(nama + "|" + kelas);
            if(isDone) selesai++;
            html += `<div style="margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.9em;">${nama}</span>
                        <span class="status-tag ${isDone?'tag-done':'tag-pending'}">${isDone?'Selesai':'Belum'}</span>
                     </div>`;
        });
        document.getElementById('statSelesai').innerText = selesai;
        document.getElementById('statBelum').innerText = dataSekolah[kelas].length - selesai;
        listDiv.innerHTML = html;
    }

    function draw() {
        if (!currentStream || video.paused || video.ended) return;
        
        canvas.width = 350; canvas.height = 450;
        ctx.drawImage(video, -100, 0, 600, 450); 
        
        let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < frame.data.length; i += 4) {
            let r = frame.data[i], g = frame.data[i+1], b = frame.data[i+2];
            // Logik Chroma Key (Green Screen)
            if (g > 100 && g > r * 1.2 && g > b * 1.2) { 
                if(selectedBG === 'blue') { 
                    frame.data[i]=0; frame.data[i+1]=0; frame.data[i+2]=255; 
                } else { 
                    frame.data[i]=255; frame.data[i+1]=255; frame.data[i+2]=255; 
                }
            }
        }
        ctx.putImageData(frame, 0, 0);
        requestAnimationFrame(draw);
    }

    async function ambilGambar() {
        const nama = document.getElementById('pilihNama').value;
        const kelas = document.getElementById('pilihKelas').value;
        const btn = document.getElementById('btnSnap');

        if(!nama || !kelas) return alert("Sila pilih Nama & Kelas!");
        if(!currentStream) return alert("Sila buka kamera terlebih dahulu!");

        btn.innerText = "PROSES MUAT NAIK...";
        btn.disabled = true;

        const imageData = canvas.toDataURL('image/jpeg', 0.9);

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ image: imageData, filename: `${nama}_${kelas}.jpg`, nama: nama, kelas: kelas })
            });
            alert("Gambar " + nama + " Berjaya Disimpan!");
        } catch (e) {
            alert("Ralat muat naik! Sila cuba lagi.");
        } finally {
            btn.innerText = "AMBIL & SIMPAN";
            btn.disabled = false;
            updateStats();
        }
    }
</script>
</body>
</html>
