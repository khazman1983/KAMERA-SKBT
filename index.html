<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kamera AI SKBT v11</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .camera-box, .dashboard-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Paparan Visual */
        canvas, #previewImg { border: 4px solid #333; border-radius: 10px; background: #000; width: 300px; height: 385px; display: block; margin: 0 auto; }
        #previewImg { background: #eee; object-fit: cover; display: none; }
        
        /* Butang Kawalan */
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin: 3px; transition: 0.3s; font-size: 0.85em; }
        .btn-blue { background: #0055ff; } 
        .btn-white { background: #ffffff; color: #333; border: 1px solid #ccc; }
        .btn-capture { background: #28a745; width: 100%; font-size: 1.1em; margin-top: 15px; }
        .btn-open { background: #20c997; }
        .btn-zoom { background: #6f42c1; }
        .btn-reset-status { background: #6c757d; font-size: 0.7em; padding: 5px 10px; }
        
        /* Dashboard Status Murid */
        .status-item { margin-bottom: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid transparent; background: #f9f9f9; }
        .item-done { border-left-color: #28a745; background: #e8f5e9; }
        .item-pending { border-left-color: #dc3545; background: #fdf2f2; }
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.7em; font-weight: bold; color: white; display: inline-block; margin-top: 5px; }
        .tag-done { background: #28a745; }
        .tag-pending { background: #dc3545; }
        
        .search-box { width: 94%; padding: 10px; margin-top: 5px; border: 2px solid #0055ff; border-radius: 8px; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
        
        /* Overlay Pemuatan AI */
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; display: none; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h2 style="margin-top:20px;">🤖 Menyiapkan AI Stabil...</h2>
    <p>Sila tunggu sehingga model ResNet50 dimuatkan.</p>
</div>

<h1 style="text-align:center;">📸 Sistem Kamera AI SKBT v11</h1>

<div class="main-container">
    <div class="camera-box" style="width: 350px;">
        <label>Pilih Kelas & Nama:</label>
        <select id="pilihKelas" onchange="muatNama()">
            <option value="">-- Pilih Kelas --</option>
        </select>
        <select id="pilihNama">
            <option value="">-- Pilih Nama --</option>
        </select>
        <input type="text" id="searchNama" class="search-box" oninput="tapisNama()" placeholder="🔍 Cari nama murid...">

        <video id="video" autoplay playsinline style="display:none;"></video>
        
        <div style="margin-top:15px;">
            <div id="labelLive" style="text-align:center; font-weight:bold; color:red;">🔴 MOD AI AKTIF</div>
            <canvas id="canvas"></canvas>
            <div id="labelPreview" style="text-align:center; font-weight:bold; color:#0055ff; display:none;">✅ PREVIEW TERAKHIR</div>
            <img id="previewImg" alt="Preview Gambar">
        </div>

        <div style="text-align:center; margin-top: 10px;">
            <button class="btn btn-open" onclick="mulaSistemAI()">📹 Buka Kamera</button>
            <button class="btn btn-zoom" onclick="zoomIn()">➕ In</button>
            <button class="btn btn-zoom" onclick="zoomOut()">➖ Out</button>
            <button class="btn btn-zoom" onclick="zoomLevel=1.0">🔄 Reset</button>
        </div>

        <div style="margin: 10px 0; text-align:center;">
            <button class="btn btn-blue" onclick="selectedBG='blue'">Latar Biru</button>
            <button class="btn btn-white" onclick="selectedBG='white'">Latar Putih</button>
        </div>
        <button id="btnSnap" class="btn btn-capture" onclick="ambilGambar()">AMBIL & SIMPAN</button>
    </div>

    <div class="dashboard-box" style="width: 450px;">
        <h3>📊 Dashboard Status Murid</h3>
        <div id="listDashboard" style="height: 550px; overflow-y: auto; padding-right:5px;">
            <p style="color:gray; text-align:center;">Sila pilih kelas untuk melihat senarai...</p>
        </div>
    </div>
</div>

<script>
    // Pastikan URL ini adalah URL Web App yang terkini daripada Apps Script
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyTMq0RHNvcJqQla3pUyIgCp5ffRPvEedb6HV9lmmFEgjvC_513_7vdZssFXN0qPul7/exec';
    
    let net, video, canvas, ctx, currentStream, animationId;
    let dataSekolah = {}, sudahSelesaiList = [], selectedBG = 'blue', zoomLevel = 1.0;

    // 1. Muat data awal semasa halaman dibuka
    window.onload = async () => {
        try {
            const res = await fetch(scriptURL);
            dataSekolah = await res.json();
            const selKelas = document.getElementById('pilihKelas');
            Object.keys(dataSekolah).forEach(k => selKelas.add(new Option(k, k)));
            updateStats();
        } catch (e) { console.error("Gagal memuat senarai nama."); }
    };

    // 2. Memulakan Model AI (ResNet50 untuk kestabilan tinggi)
    async function mulaSistemAI() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        net = await bodyPix.load({
            architecture: 'ResNet50',
            outputStride: 32,
            quantBytes: 2
        });
        document.getElementById('loadingOverlay').style.display = 'none';
        bukaKamera();
    }

    // 3. Mengaktifkan Kamera Video
    async function bukaKamera() {
        video = document.getElementById('video');
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = currentStream;
            video.onloadedmetadata = () => { 
                video.play(); 
                canvas.style.display = "block";
                document.getElementById('previewImg').style.display = "none";
                document.getElementById('labelLive').style.display = "block";
                document.getElementById('labelPreview').style.display = "none";
                renderAILoop(); 
            };
        } catch (err) { alert("Sila benarkan akses kamera."); }
    }

    // 4. Gelung Render AI (Memisahkan subjek daripada latar belakang)
    async function renderAILoop() {
        if (!currentStream || video.paused) return;

        const segmentation = await net.segmentPerson(video, {
            internalResolution: 'high',
            segmentationThreshold: 0.7
        });

        canvas.width = 300; canvas.height = 385;
        
        // Logik Zoom
        let w = video.videoWidth / zoomLevel;
        let h = video.videoHeight / zoomLevel;
        let x = (video.videoWidth - w) / 2;
        let y = (video.videoHeight - h) / 2;

        // Gunakan canvas sementara untuk pembersihan piksel
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(video, x, y, w, h, 0, 0, canvas.width, canvas.height);

        const imgData = tCtx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < segmentation.data.length; i++) {
            if (segmentation.data[i] === 0) { // Jika piksel dikesan sebagai latar belakang
                const j = i * 4;
                if(selectedBG === 'blue') {
                    data[j] = 0; data[j+1] = 0; data[j+2] = 255; // Biru
                } else {
                    data[j] = 255; data[j+1] = 255; data[j+2] = 255; // Putih
                }
            }
        }
        ctx.putImageData(imgData, 0, 0);
        animationId = requestAnimationFrame(renderAILoop);
    }

    // 5. Kawalan Zoom
    function zoomIn() { if(zoomLevel < 2.5) zoomLevel += 0.1; }
    function zoomOut() { if(zoomLevel > 1.0) zoomLevel -= 0.1; }

    // 6. Pengurusan Dashboard & Status
    async function updateStats() {
        const res = await fetch(scriptURL + "?action=getStats");
        sudahSelesaiList = await res.json();
        renderDashboard();
    }

    function renderDashboard() {
        const kelas = document.getElementById('pilihKelas').value;
        const listDiv = document.getElementById('listDashboard');
        if(!kelas) return;
        
        let html = "";
        dataSekolah[kelas].forEach(nama => {
            const isDone = sudahSelesaiList.includes(nama + "|" + kelas);
            html += `
                <div class="status-item ${isDone?'item-done':'item-pending'}">
                    <div>
                        <div style="font-weight:bold; font-size:0.85em;">${nama}</div>
                        <span class="status-tag ${isDone?'tag-done':'tag-pending'}">${isDone?'SIAP':'BELUM'}</span>
                    </div>
                    ${isDone ? `<button class="btn btn-reset-status" onclick="resetStatus('${nama}','${kelas}')">🔄 Reset</button>` : ''}
                </div>`;
        });
        listDiv.innerHTML = html;
    }

    async function resetStatus(nama, kelas) {
        if(!confirm(`Beri peluang ${nama} ambil gambar semula?`)) return;
        try {
            await fetch(`${scriptURL}?action=resetStatus&nama=${encodeURIComponent(nama)}&kelas=${encodeURIComponent(kelas)}`);
            await updateStats();
        } catch (e) { alert("Gagal mengemaskini status."); }
    }

    // 7. Proses Ambil & Simpan Gambar
    async function ambilGambar() {
        const nama = document.getElementById('pilihNama').value;
        const kelas = document.getElementById('pilihKelas').value;
        const btn = document.getElementById('btnSnap');
        
        if(!nama || !kelas) return alert("Pilih Murid & Kelas!");
        
        btn.innerText = "MENYIMPAN...";
        btn.disabled = true;

        const imageData = canvas.toDataURL('image/jpeg', 1.0);
        
        // Tunjukkan PREVIEW
        document.getElementById('previewImg').src = imageData;
        document.getElementById('previewImg').style.display = "block";
        document.getElementById('canvas').style.display = "none";
        document.getElementById('labelLive').style.display = "none";
        document.getElementById('labelPreview').style.display = "block";

        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ image: imageData, filename: `${nama}_${kelas}.jpg`, nama: nama, kelas: kelas }) 
            });
            await updateStats();
        } catch (e) { alert("Ralat muat naik."); } 
        finally { 
            btn.innerText = "AMBIL & SIMPAN"; 
            btn.disabled = false; 
        }
    }

    // 8. Carian & Dropdown
    function muatNama() { document.getElementById('searchNama').value = ""; tapisNama(); renderDashboard(); }
    function tapisNama() {
        const kataKunci = document.getElementById('searchNama').value.toLowerCase();
        const kelas = document.getElementById('pilihKelas').value;
        const selNama = document.getElementById('pilihNama');
        selNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if(dataSekolah[kelas]) {
            dataSekolah[kelas].filter(n => n.toLowerCase().includes(kataKunci))
                .forEach(n => selNama.add(new Option(n, n)));
        }
    }
</script>
</body>
</html>
